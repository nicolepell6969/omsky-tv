name: Android CI - Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: |
        cd omsky-tv-android
        chmod +x gradlew
        
    - name: Build Debug APK
      run: |
        cd omsky-tv-android
        ./gradlew assembleDebug --stacktrace
        
    - name: Build Release APK (unsigned)
      run: |
        cd omsky-tv-android
        ./gradlew assembleRelease --stacktrace
      continue-on-error: true
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: omsky-tv-debug-apk
        path: omsky-tv-android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: omsky-tv-release-apk
        path: omsky-tv-android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
      continue-on-error: true
        
    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Omsky TV v1.0.${{ github.run_number }}
        body: |
          ## Omsky TV - Free IPTV App
          
          ### What's New
          - 5,000+ live TV channels from 150+ countries
          - Search and filter by category/country
          - HLS video streaming support
          - Material Design 3 UI
          - Dark theme
          
          ### Download
          - **app-debug.apk**: For testing (recommended)
          - **app-release-unsigned.apk**: Production build (needs signing)
          
          ### Installation
          1. Download app-debug.apk
          2. Enable "Install from Unknown Sources" on your Android device
          3. Install the APK
          4. Enjoy!
          
          Built with ❤️ by Feren Reza Reynaldo
        files: |
          omsky-tv-android/app/build/outputs/apk/debug/app-debug.apk
          omsky-tv-android/app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
